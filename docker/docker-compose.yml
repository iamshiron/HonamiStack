name: shiron-honamicore-sandbox
services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-admin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-admin_pw}
      SANDBOX_BUCKET: ${SANDBOX_BUCKET:-sandbox}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://$$MINIO_ENDPOINT:$$MINIO_PORT $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;

      mc mb myminio/$$SANDBOX_BUCKET --ignore-existing;
      mc anonymous set download myminio/$$SANDBOX_BUCKET;
      echo 'Buckets created and policies set';
      "

  adminer:
    image: adminer:latest
    depends_on:
      - postgres
    ports:
      - 8080:8080

volumes:
  postgres_data:
    driver: local
